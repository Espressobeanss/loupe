<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1280" width="1280" height="1280" role="img" aria-label="Loupe — messy in, sharp out">
  <rect width="1280" height="1280" fill="#EEEBE3"/>
  <g transform="translate(0,320)">
    <rect x="64" y="56" width="1152" height="528" rx="28" fill="#FBFAF7" stroke="#1E1C18" stroke-opacity="0.14"/>

    <g transform="translate(128,118) scale(1.9)">
      <circle cx="27" cy="27" r="16.5" fill="#ffffff" stroke="#1E1C18" stroke-width="5"/>
      <path d="M16.5 27A10.5 10.5 0 0 1 27 16.5" fill="none" stroke="#1D9E75" stroke-width="3" stroke-linecap="round"/>
      <circle cx="27" cy="27" r="3.6" fill="#D85A30"/>
      <line x1="38.8" y1="38.8" x2="54" y2="54" stroke="#1E1C18" stroke-width="7" stroke-linecap="round"/>
    </g>

    <text x="278" y="190" font-family="Georgia, 'Times New Roman', serif" font-size="104" fill="#1E1C18">loupe</text>
    <text x="284" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-style="italic" fill="#5F5C54">messy in, sharp out.</text>

    <line x1="128" y1="312" x2="1152" y2="312" stroke="#1E1C18" stroke-opacity="0.12"/>

    <text x="128" y="382" font-family="Georgia, 'Times New Roman', serif" font-size="38" fill="#1E1C18">The design critic startups don&#8217;t have time to convene.</text>
    <text x="128" y="432" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="24" fill="#5F5C54">Raw user research in &#8212; one clear, visual, opinionated report out.</text>

    <g transform="translate(128,470)">
      <rect x="0" y="0" width="148" height="38" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-opacity="0.5"/>
      <text x="20" y="25" font-family="Georgia, serif" font-size="18" fill="#04342C">open source</text>
      <rect x="164" y="0" width="72" height="38" rx="8" fill="#ffffff" stroke="#1E1C18" stroke-opacity="0.18"/>
      <text x="184" y="25" font-family="Georgia, serif" font-size="18" fill="#1E1C18">MIT</text>
      <rect x="252" y="0" width="192" height="38" rx="8" fill="#ffffff" stroke="#1E1C18" stroke-opacity="0.18"/>
      <text x="272" y="25" font-family="Georgia, serif" font-size="18" fill="#1E1C18">zero dependencies</text>
    </g>
  </g>
</svg>
