<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 980" width="980" height="980" role="img" aria-label="Example Loupe report">
  <rect width="980" height="980" fill="#EEEBE3"/>
  <g transform="translate(0,50)" font-family="-apple-system, Helvetica, Arial, sans-serif">
    <rect x="20" y="20" width="940" height="840" rx="18" fill="#FBFAF7" stroke="#1E1C18" stroke-opacity="0.16"/>

    <!-- masthead -->
    <g transform="translate(40,30) scale(0.5)">
      <circle cx="27" cy="27" r="16.5" fill="#ffffff" stroke="#1E1C18" stroke-width="5"/>
      <path d="M16.5 27A10.5 10.5 0 0 1 27 16.5" fill="none" stroke="#1D9E75" stroke-width="3" stroke-linecap="round"/>
      <circle cx="27" cy="27" r="3.6" fill="#D85A30"/>
      <line x1="38.8" y1="38.8" x2="54" y2="54" stroke="#1E1C18" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="78" y="60" font-family="Georgia, serif" font-size="24" fill="#1E1C18">loupe</text>
    <text x="940" y="56" text-anchor="end" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#918D83">the checkout read &#183; no. 1</text>
    <line x1="20" y1="80" x2="960" y2="80" stroke="#1E1C18" stroke-width="1.5"/>

    <!-- depth bar -->
    <rect x="20" y="80" width="940" height="42" fill="#F4F1EA"/>
    <line x1="20" y1="122" x2="960" y2="122" stroke="#1E1C18" stroke-opacity="0.12"/>
    <text x="46" y="106" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#5F5C54">standard view</text>
    <text x="700" y="106" font-family="Georgia, serif" font-size="13" fill="#918D83">Quick</text>
    <rect x="748" y="90" width="80" height="24" rx="6" fill="#FBFAF7" stroke="#1E1C18" stroke-opacity="0.16"/>
    <text x="758" y="106" font-family="Georgia, serif" font-size="13" fill="#1E1C18">Standard</text>
    <text x="844" y="106" font-family="Georgia, serif" font-size="13" fill="#918D83">Deep + visual</text>

    <!-- verdict -->
    <text x="46" y="160" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#5F5C54">The verdict &#8212;</text>
    <text x="46" y="196" font-family="Georgia, serif" font-size="25" fill="#1E1C18">People bail at the admin fee. It reads as a</text>
    <text x="46" y="230" font-family="Georgia, serif" font-size="25" fill="#1E1C18">charge you&#8217;re sneaking in at the last second.</text>
    <g transform="translate(772,150) rotate(2)">
      <rect x="0" y="0" width="158" height="34" rx="8" fill="#FBFAF7" stroke="#1D9E75" stroke-width="1.5"/>
      <text x="18" y="22" font-family="Georgia, serif" font-size="13" fill="#04342C">high confidence</text>
    </g>

    <!-- filed -->
    <line x1="46" y1="258" x2="934" y2="258" stroke="#1E1C18" stroke-opacity="0.12"/>
    <text x="46" y="286" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#918D83">Filed from 47 tickets, 1 Figma flow &amp; 12 call notes &#8212; freshest two hours ago.</text>

    <!-- signals -->
    <text x="46" y="328" font-family="Georgia, serif" font-size="16" fill="#1E1C18">What we saw</text>
    <g font-size="13">
      <text x="46" y="362" fill="#5F5C54">&#8220;why am I charged more?&#8221;</text>
      <rect x="300" y="351" width="520" height="16" rx="3" fill="#ECE8DF"/>
      <rect x="300" y="351" width="520" height="16" rx="3" fill="#D85A30"/>
      <text x="840" y="363" font-weight="600" fill="#1E1C18">31</text>

      <text x="46" y="392" fill="#5F5C54">back-button at checkout</text>
      <rect x="300" y="381" width="520" height="16" rx="3" fill="#ECE8DF"/>
      <rect x="300" y="381" width="203" height="16" rx="3" fill="#EF9F27"/>
      <text x="840" y="393" font-weight="600" fill="#1E1C18">12</text>

      <text x="46" y="422" fill="#5F5C54">&#8220;I thought it was free&#8221;</text>
      <rect x="300" y="411" width="520" height="16" rx="3" fill="#ECE8DF"/>
      <rect x="300" y="411" width="135" height="16" rx="3" fill="#EF9F27"/>
      <text x="840" y="423" font-weight="600" fill="#1E1C18">8</text>
    </g>

    <!-- critique -->
    <text x="46" y="466" font-family="Georgia, serif" font-size="16" fill="#1E1C18">From the panel</text>
    <rect x="46" y="480" width="2" height="92" fill="#D85A30"/>
    <text x="66" y="502" font-family="Georgia, serif" font-style="italic" font-size="17" fill="#1E1C18">&#8220;The total breaks its promise. You quote one</text>
    <text x="66" y="530" font-family="Georgia, serif" font-style="italic" font-size="17" fill="#1E1C18">price, then change it at the door &#8212; that&#8217;s not a</text>
    <text x="66" y="558" font-family="Georgia, serif" font-style="italic" font-size="17" fill="#1E1C18">pricing bug, it&#8217;s a trust bug.&#8221;</text>
    <text x="66" y="590" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#5F5C54">&#8212; the crit, on visibility of system status</text>
    <rect x="440" y="578" width="104" height="22" rx="8" fill="#FBFAF7" stroke="#D85A30"/>
    <text x="452" y="593" font-size="11" fill="#4A1B0C">severity: high</text>

    <!-- next steps -->
    <text x="46" y="640" font-family="Georgia, serif" font-size="16" fill="#1E1C18">So, next &#8212; for</text>
    <text x="196" y="640" font-family="Georgia, serif" font-size="13" fill="#5F5C54">Founder</text>
    <rect x="266" y="624" width="74" height="24" rx="6" fill="#E1F5EE" stroke="#1D9E75"/>
    <text x="278" y="640" font-family="Georgia, serif" font-size="13" fill="#04342C">Product</text>
    <text x="352" y="640" font-family="Georgia, serif" font-size="13" fill="#5F5C54">Design</text>
    <text x="418" y="640" font-family="Georgia, serif" font-size="13" fill="#5F5C54">Engineering</text>
    <text x="520" y="640" font-family="Georgia, serif" font-size="13" fill="#5F5C54">Ops / CX</text>
    <text x="592" y="640" font-family="Georgia, serif" font-size="13" fill="#5F5C54">Growth</text>
    <text x="46" y="668" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#918D83">Same verdict, same crit &#8212; only the actions below re-aim.</text>

    <g font-size="14">
      <text x="46" y="704" font-family="Georgia, serif" font-size="15" fill="#918D83">i.</text>
      <rect x="68" y="690" width="66" height="20" rx="6" fill="#E6F1FB" stroke="#85B7EB"/>
      <text x="78" y="704" font-size="10" fill="#0C447C">this week</text>
      <text x="146" y="704" fill="#1E1C18">Spec &#8220;fee on the pricing screen&#8221; &#8212; rank it #1 this sprint.</text>

      <text x="46" y="736" font-family="Georgia, serif" font-size="15" fill="#918D83">ii.</text>
      <rect x="68" y="722" width="66" height="20" rx="6" fill="#E6F1FB" stroke="#85B7EB"/>
      <text x="78" y="736" font-size="10" fill="#0C447C">this week</text>
      <text x="146" y="736" fill="#1E1C18">Rename &#8220;admin fee&#8221; to what it covers.</text>

      <text x="46" y="768" font-family="Georgia, serif" font-size="15" fill="#918D83">iii.</text>
      <rect x="68" y="754" width="56" height="20" rx="6" fill="#ECE8DF" stroke="#1E1C18" stroke-opacity="0.2"/>
      <text x="78" y="768" font-size="10" fill="#5F5C54">explore</text>
      <text x="136" y="768" fill="#5F5C54">Worth a test later: one all-in price vs. itemized.</text>
    </g>

    <text x="934" y="824" text-anchor="end" font-family="Georgia, serif" font-style="italic" font-size="12" fill="#918D83">looked closely, so you could look once. &#8212; Loupe</text>
  </g>
</svg>
